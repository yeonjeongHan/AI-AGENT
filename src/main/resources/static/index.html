<script>
    // 공통 sidebar 불러오기
    fetch("components/sidebar.html")
        .then(response => {
            if (!response.ok) {
                throw new Error("sidebar 불러오기 실패: " + response.status);
            }
            return response.text();
        })
        .then(html => {
            document.getElementById("sidebar-container").innerHTML = html;

            // 현재 페이지 active 처리
            const currentPage = location.pathname.split("/").pop() || "index.html";

            document.querySelectorAll(".menu a").forEach(a => {
                const linkPage = a.getAttribute("href");
                if (linkPage === currentPage) {
                    a.classList.add("active");
                }
            });
        })
        .catch(error => {
            console.error(error);
        });

    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const message = input.value.trim();

        if (!message) return;

        addMessage("user", message);
        input.value = "";
        sendBtn.disabled = true;

        const loadingId = addMessage("bot", "응답 생성 중...");

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    user: "test1234",
                    conversation_id: "",
                    files: [
                        {
                            type: "image",
                            transfer_method: "remote_url",
                            url: "https://api.abclab.ktds.com/v1/logo/logo.png"
                        }
                    ]
                })
            });

            if (!res.ok) {
                throw new Error("HTTP " + res.status);
            }

            const data = await res.json();
            const reply = data.reply ?? "응답이 없습니다.";

            removeMessage(loadingId);
            addMessage("bot", reply);

        } catch (error) {
            removeMessage(loadingId);
            addMessage("bot", "오류 발생: " + error.message);
        } finally {
            sendBtn.disabled = false;
        }
    }

    function addMessage(type, text) {
        const chatBody = document.getElementById("chatBody");
        const div = document.createElement("div");
        div.className = "message " + type;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        div.appendChild(bubble);
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;

        return div;
    }

    function removeMessage(element) {
        if (element && element.parentNode) {
            element.parentNode.removeChild(element);
        }
    }

    document.getElementById("messageInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>
