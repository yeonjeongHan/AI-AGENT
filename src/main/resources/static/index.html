<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Chat</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(255,255,255,0.08);
            --panel-border: rgba(255,255,255,0.12);
            --text: #e2e8f0;
            --subtext: #94a3b8;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
            --bot-bubble: rgba(255,255,255,0.12);
            --shadow: 0 20px 60px rgba(0,0,0,0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(99,102,241,0.25), transparent 30%),
                radial-gradient(circle at bottom right, rgba(14,165,233,0.18), transparent 25%),
                var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .chat-shell {
            width: 100%;
            max-width: 980px;
            height: 92vh;
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(18px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.04);
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand span {
            color: #a5b4fc;
        }

        .status {
            font-size: 13px;
            color: var(--subtext);
        }

        .profile-card {
            padding: 16px;
            border-radius: 18px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
        }

        .profile-title {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .chip {
            display: inline-block;
            margin: 4px 6px 0 0;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: #dbeafe;
            font-size: 12px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            padding: 22px 28px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .header .sub {
            font-size: 13px;
            color: var(--subtext);
            margin-top: 4px;
        }

        .online {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.8);
        }

        .messages {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            margin-bottom: 18px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 72%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: fadeInUp 0.25s ease;
        }

        .user .bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .bot .bubble {
            background: var(--bot-bubble);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            border-bottom-left-radius: 6px;
        }

        .input-area {
            padding: 20px 24px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .input-box {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 10px;
        }

        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            padding: 10px 12px;
        }

        .input-box input::placeholder {
            color: #94a3b8;
        }

        .input-box button {
            border: none;
            padding: 12px 18px;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .input-box button\:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .input-box button\:active {
            transform: translateY(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .chat-shell {
                flex-direction: column;
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.08);
            }

            .bubble {
                max-width: 88%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-shell">
        <aside class="sidebar">
            <div>
                <div class="brand">Works <span>Chat</span></div>
                <div class="status">채팅Bot</div>
            </div>

            <div class="profile-card">
                <div class="profile-title">바로가기</div>
                <div class="chip">SAP</div>
                <div class="chip">Java</div>
                <div class="chip">Spring Boot</div>
                <div class="chip">WebSocket</div>
                <div class="chip">Azure</div>
            </div>

            <div class="profile-card">
                <div class="profile-title">현재 상태</div>
                <div class="status">메시지 12개</div>
                <div class="status">연결 상태: 정상</div>
            </div>
        </aside>

        <main class="main">
            <div class="header">
                <div>
                    <h1>한연정님과의 대화</h1>
                    <div class="sub">빠르고 깔끔한 업무용 채팅 화면</div>
                </div>
                <div class="online">
                    <span class="dot"></span>
                    Online
                </div>
            </div>

            <div class="messages" id="chatBody">
                <div class="message bot">
                    <div class="bubble">안녕하세요. 무엇을 도와드릴까요?</div>
                </div>
                <div class="message user">
                    <div class="bubble">알려줘</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="messageInput" placeholder="메시지를 입력하세요...">
                    <button onclick="sendMessage()">전송</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById("messageInput");
            const chatBody = document.getElementById("chatBody");
            const message = input.value.trim();

            if (!message) return;

            const userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerHTML = '<div class="bubble"></div>';
            userMsg.querySelector(".bubble").textContent = message;

            chatBody.appendChild(userMsg);
            input.value = "";
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        document.getElementById("messageInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
