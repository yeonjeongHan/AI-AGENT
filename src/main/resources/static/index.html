<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>챗봇</title>
  <link rel="stylesheet" href="./css/common.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar-container {
      width: 220px;
      background: #f4f4f4;
      border-right: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
      gap: 12px;
    }

    #chatBody {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      overflow-y: auto;
      background: #fff;
    }

    .message {
      margin-bottom: 10px;
      display: flex;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      background: #e5e7eb;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #dbeafe;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    #sendBtn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    #sendBtn\:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="main">
    <div id="chatBody"></div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="메시지를 입력하세요" />
      <button id="sendBtn">전송</button>
    </div>
  </div>

  <script src="./js/common.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const input = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");

      if (input) {
        input.addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendMessage();
          }
        });
      }

      if (sendBtn) {
        sendBtn.addEventListener("click", sendMessage);
      }
    });

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");

      if (!input || !sendBtn) {
        console.error("messageInput 또는 sendBtn 요소가 없습니다.");
        return;
      }

      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";
      sendBtn.disabled = true;

      const loadingId = addMessage("bot", "응답 생성 중...");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: message,
            user: "test1234",
            conversation_id: "",
            files: [
              {
                type: "image",
                transfer_method: "remote_url",
                url: "https://api.abclab.ktds.com/v1/logo/logo.png"
              }
            ]
          })
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const reply = data.reply ?? "응답이 없습니다.";

        removeMessage(loadingId);
        addMessage("bot", reply);

      } catch (error) {
        removeMessage(loadingId);
        addMessage("bot", "오류 발생: " + error.message);
      } finally {
        sendBtn.disabled = false;
      }
    }

    function addMessage(type, text) {
      const chatBody = document.getElementById("chatBody");
      if (!chatBody) {
        console.error("chatBody 요소가 없습니다.");
        return null;
      }

      const div = document.createElement("div");
      div.className = "message " + type;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      div.appendChild(bubble);
      chatBody.appendChild(div);
      chatBody.scrollTop = chatBody.scrollHeight;

      return div;
    }

    function removeMessage(element) {
      if (element && element.parentNode) {
        element.parentNode.removeChild(element);
      }
    }
  </script>
</body>
</html>
