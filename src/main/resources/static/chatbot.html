<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        /* sidebar 공통 스타일 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            height: 100vh;
            background: #111827;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 20px 16px;
            z-index: 1000;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #ffffff;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu li {
            margin-bottom: 10px;
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: #cbd5e1;
            padding: 12px 14px;
            border-radius: 10px;
            transition: 0.2s;
            font-size: 14px;
        }

        .menu a\:hover {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
        }

        .menu a.active {
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            color: #ffffff;
            font-weight: bold;
        }

        /* 본문 전체 영역 */
        .main-content {
            margin-left: 220px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .chat-shell {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.04);
        }

        .header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            font-size: 18px;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            margin-bottom: 14px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .bubble {
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: #111827;
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        .input-box input {
            flex: 1;
            padding: 14px;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            outline: none;
        }

        .input-box button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .input-box button\:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .top-button {
            margin: 16px 16px 0;
        }

        .top-button button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: #2f6fed;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .top-button button\:hover {
            background: #2558c7;
        }
    </style>
</head>
<body>

    <!-- 공통 메뉴바가 들어갈 위치 -->
    <div id="sidebar-container"></div>

    <!-- 본문 -->
    <div class="main-content">
        <div class="chat-shell">
            <div class="header">AI Chat</div>

            <div class="messages" id="chatBody">
                <div class="message bot">
                    <div class="bubble">안녕하세요. 무엇을 도와드릴까요?</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." />
                    <button id="sendBtn" onclick="sendMessage()">전송</button>
                </div>
            </div>

            <div class="top-button">
                <button type="button" onclick="window.location.href='knowledge.html'">
                    지식 문서 업데이트
                </button>
            </div>
        </div>
    </div>

<script>
    // 공통 sidebar 불러오기
    fetch("components/sidebar.html")
        .then(response => {
            if (!response.ok) {
                throw new Error("sidebar 불러오기 실패: " + response.status);
            }
            return response.text();
        })
        .then(html => {
            document.getElementById("sidebar-container").innerHTML = html;
        })
        .catch(error => {
            console.error(error);
        });

    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const message = input.value.trim();

        if (!message) return;

        addMessage("user", message);
        input.value = "";
        sendBtn.disabled = true;

        const loadingId = addMessage("bot", "응답 생성 중...");

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    user: "test1234",
                    conversation_id: "",
                    files: [
                        {
                            type: "image",
                            transfer_method: "remote_url",
                            url: "https://api.abclab.ktds.com/v1/logo/logo.png"
                        }
                    ]
                })
            });

            if (!res.ok) {
                throw new Error("HTTP " + res.status);
            }

            const data = await res.json();
            const reply = data.reply ?? "응답이 없습니다.";

            removeMessage(loadingId);
            addMessage("bot", reply);

        } catch (error) {
            removeMessage(loadingId);
            addMessage("bot", "오류 발생: " + error.message);
        } finally {
            sendBtn.disabled = false;
        }
    }

    function addMessage(type, text) {
        const chatBody = document.getElementById("chatBody");
        const div = document.createElement("div");
        div.className = "message " + type;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        div.appendChild(bubble);
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;

        return div;
    }

    function removeMessage(element) {
        if (element && element.parentNode) {
            element.parentNode.removeChild(element);
        }
    }

    document.getElementById("messageInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
