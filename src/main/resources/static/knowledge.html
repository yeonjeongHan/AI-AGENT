<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지식 생성 화면</title>
  <link rel="stylesheet" href="./css/common.css">
<style>
  :root {
    --bg: #0b1220;
    --panel: #0f172a;
    --panel-2: #111827;
    --panel-border: rgba(148, 163, 184, 0.14);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --input-bg: #0b1324;
    --input-border: #24324a;
    --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.22);
  }

  * {
    box-sizing: border-box;
  }

  .main {
    min-height: 100vh;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: none;
    margin: 0;
    padding: 28px 30px;
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(17, 24, 39, 0.96));
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    box-shadow: var(--shadow);
  }

  h2 {
    margin: 0 0 8px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #f8fafc;
  }

  .small {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #cbd5e1;
    letter-spacing: 0.01em;
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--input-border);
    border-radius: 12px;
    background: var(--input-bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
  }

  input::placeholder,
  textarea::placeholder {
    color: #64748b;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: rgba(37, 99, 235, 0.9);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
  }

  textarea {
    resize: vertical;
    min-height: 110px;
  }

  .row {
    display: flex;
    gap: 14px;
  }

  .row .form-group {
    flex: 1;
  }


  pre {
    margin-top: 22px;
    padding: 18px;
    border-radius: 14px;
    background: #050816;
    color: #dbeafe;
    border: 1px solid rgba(59, 130, 246, 0.18);
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  /* 스크롤바 */
  pre::-webkit-scrollbar {
    height: 10px;
    width: 10px;
  }

  pre::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.35);
    border-radius: 999px;
  }

  pre::-webkit-scrollbar-track {
    background: transparent;
  }

  @media (max-width: 768px) {
    .main {
      padding: 16px;
    }

    .container {
      padding: 20px;
      border-radius: 16px;
    }

    .row {
      flex-direction: column;
      gap: 0;
    }

    h2 {
      font-size: 24px;
    }
  }
</style>

</head>
<body>
  <div id="sidebar-container"></div>

  <div class="main">
    <div class="container">
      <h2>지식 생성</h2>
      <p class="small">필수 입력값만 받아 서버를 통해 API를 호출합니다.</p>

      <div class="form-group">
        <label for="name">지식 이름</label>
        <input type="text" id="name" placeholder="지식 이름" />
      </div>

      <div class="form-group">
        <label for="description">지식 설명</label>
        <textarea id="description" placeholder="지식 설명"></textarea>
      </div>

      <div class="form-group">
        <label for="permission">접근권한</label>
        <select id="permission">
          <option value="all_team_members">all_team_members</option>
          <option value="private">private</option>
          <option value="public">public</option>
        </select>
      </div>

      <div class="form-group">
        <label for="search_method">검색 설정</label>
        <select id="search_method">
          <option value="hybrid_search">hybrid_search</option>
          <option value="keyword_search">keyword_search</option>
          <option value="semantic_search">semantic_search</option>
        </select>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="top_k">top_k</label>
          <input type="number" id="top_k" value="15" />
        </div>
        <div class="form-group">
          <label for="score_threshold_enabled">score_threshold 사용 여부</label>
          <select id="score_threshold_enabled">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="score_threshold">score_threshold</label>
        <input type="number" id="score_threshold" step="0.01" value="0.7" />
      </div>

      <button onclick="createDataset()">지식 생성</button>

      <pre id="result">결과가 여기에 표시됩니다.</pre>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script>
    async function createDataset() {
      const name = document.getElementById('name').value.trim();
      const description = document.getElementById('description').value.trim();
      const permission = document.getElementById('permission').value;
      const search_method = document.getElementById('search_method').value;
      const top_k = parseInt(document.getElementById('top_k').value, 10);
      const score_threshold_enabled = document.getElementById('score_threshold_enabled').value === 'true';
      const score_threshold = parseFloat(document.getElementById('score_threshold').value);

      if (!name || !description) {
        document.getElementById('result').textContent = '지식 이름과 지식 설명은 필수 입력입니다.';
        return;
      }

      const payload = {
        name,
        description,
        permission,
        retrieval_model: {
          search_method,
          top_k,
          score_threshold_enabled,
          score_threshold
        }
      };

      document.getElementById('result').textContent = '요청 중...';

      try {
        const response = await fetch('/api/update', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const text = await response.text();

        if (!response.ok) {
          document.getElementById('result').textContent =
            `에러 발생 (${response.status})\n\n${text}`;
          return;
        }

        document.getElementById('result').textContent =
          `성공\n\n${text}`;
      } catch (error) {
        document.getElementById('result').textContent =
          `네트워크 또는 CORS 오류\n\n${error.message}`;
      }
    }
  </script>
</body>
</html>
