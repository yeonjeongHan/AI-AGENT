<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지식 생성 화면</title>
  <link rel="stylesheet" href="./css/common.css">
<style>
  :root {
    --bg: #f3f6fb;
    --card: rgba(255, 255, 255, 0.9);
    --card-border: rgba(255, 255, 255, 0.7);
    --text: #1f2937;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --border: #dbe3ef;
    --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  }

  body {
    margin: 0;
    font-family: "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    background:
      radial-gradient(circle at top left, #e8f0ff 0%, transparent 30%),
      linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    color: var(--text);
  }

  .container {
    max-width: 920px;
    margin: 40px auto;
    padding: 28px 30px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  h2 {
    margin: 0 0 8px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #111827;
  }

  .small {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 14px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #374151;
  }

  input,
  select,
  textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-sizing: border-box;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    transition: all 0.2s ease;
    outline: none;
  }

  input::placeholder,
  textarea::placeholder {
    color: #9ca3af;
  }

  input\:focus,
  select\:focus,
  textarea\:focus {
    border-color: rgba(37, 99, 235, 0.6);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
  }

  textarea {
    resize: vertical;
    min-height: 110px;
  }

  .row {
    display: flex;
    gap: 14px;
  }

  .row .form-group {
    flex: 1;
  }

  button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }

  button\:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
  }

  button\:active {
    transform: translateY(0);
    opacity: 0.95;
  }

  pre {
    margin-top: 22px;
    padding: 18px;
    border-radius: 14px;
    background: #0f172a;
    color: #dbeafe;
    border: 1px solid rgba(148, 163, 184, 0.2);
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  @media (max-width: 768px) {
    .container {
      margin: 16px;
      padding: 20px;
      border-radius: 16px;
    }

    .row {
      flex-direction: column;
      gap: 0;
    }

    h2 {
      font-size: 24px;
    }
  }
</style>
</head>
<body>
  <div id="sidebar-container"></div>

  <div class="main">
    <div class="container">
      <h2>지식 생성</h2>
      <p class="small">필수 입력값만 받아 서버를 통해 API를 호출합니다.</p>

      <div class="form-group">
        <label for="name">지식 이름</label>
        <input type="text" id="name" placeholder="지식 이름" />
      </div>

      <div class="form-group">
        <label for="description">지식 설명</label>
        <textarea id="description" placeholder="지식 설명"></textarea>
      </div>

      <div class="form-group">
        <label for="permission">접근권한</label>
        <select id="permission">
          <option value="all_team_members">all_team_members</option>
          <option value="private">private</option>
          <option value="public">public</option>
        </select>
      </div>

      <div class="form-group">
        <label for="search_method">검색 설정</label>
        <select id="search_method">
          <option value="hybrid_search">hybrid_search</option>
          <option value="keyword_search">keyword_search</option>
          <option value="semantic_search">semantic_search</option>
        </select>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="top_k">top_k</label>
          <input type="number" id="top_k" value="15" />
        </div>
        <div class="form-group">
          <label for="score_threshold_enabled">score_threshold 사용 여부</label>
          <select id="score_threshold_enabled">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="score_threshold">score_threshold</label>
        <input type="number" id="score_threshold" step="0.01" value="0.7" />
      </div>

      <button onclick="createDataset()">지식 생성</button>

      <pre id="result">결과가 여기에 표시됩니다.</pre>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script>
    async function createDataset() {
      const name = document.getElementById('name').value.trim();
      const description = document.getElementById('description').value.trim();
      const permission = document.getElementById('permission').value;
      const search_method = document.getElementById('search_method').value;
      const top_k = parseInt(document.getElementById('top_k').value, 10);
      const score_threshold_enabled = document.getElementById('score_threshold_enabled').value === 'true';
      const score_threshold = parseFloat(document.getElementById('score_threshold').value);

      if (!name || !description) {
        document.getElementById('result').textContent = '지식 이름과 지식 설명은 필수 입력입니다.';
        return;
      }

      const payload = {
        name,
        description,
        permission,
        retrieval_model: {
          search_method,
          top_k,
          score_threshold_enabled,
          score_threshold
        }
      };

      document.getElementById('result').textContent = '요청 중...';

      try {
        const response = await fetch('/api/update', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const text = await response.text();

        if (!response.ok) {
          document.getElementById('result').textContent =
            `에러 발생 (${response.status})\n\n${text}`;
          return;
        }

        document.getElementById('result').textContent =
          `성공\n\n${text}`;
      } catch (error) {
        document.getElementById('result').textContent =
          `네트워크 또는 CORS 오류\n\n${error.message}`;
      }
    }
  </script>
</body>
</html>
